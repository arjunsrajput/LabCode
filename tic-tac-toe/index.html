<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic tac toe</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Tic Tac toe</h1> 
    <div id="board">
        <div class="tiles" data-index="0"></div><div class="tiles" data-index="1"></div><div class="tiles" data-index="2"></div>
        <div class="tiles" data-index="3"></div><div class="tiles" data-index="4"></div><div class="tiles" data-index="5"></div>
        <div class="tiles" data-index="6"></div><div class="tiles" data-index="7"></div><div class="tiles" data-index="8"></div>
    </div>
    <div id="status">Player X's Turn</div>
    <button id="restartBtn">Restart Game</button>
    <script src="index.js"></script>
</body>
</html>
